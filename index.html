<!doctype html>
<html lang="en" style="margin: 0; padding: 0; width: 100%; height: 100%;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/assets/logo/11_copy-removebg-preview.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catamaran Studio</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #initial-loader img {
        height: 80px;
        width: auto;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; width: 100%; height: 100%; background: #000;">
    <div id="initial-loader">
      <img src="/assets/logo/logo2.png" alt="Catamaran Studio" />
    </div>
    <script>window.__pageLoadTime = Date.now();</script>
    <div id="root" style="margin: 0; padding: 0; width: 100%; height: 100%;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
